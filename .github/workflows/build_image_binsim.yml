name: Build Binsim Image

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-image-binsim-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  actions: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-binsim

jobs:
  build:
    name: Build and push binsim image
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute lowercased image path
        id: meta
        run: |
          set -euo pipefail
          image_lc="${REGISTRY}/$(echo "${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')"
          echo "image=${image_lc}" >> "$GITHUB_OUTPUT"
          echo "resolved image: ${image_lc}"

      - name: Read version from pyproject.toml
        id: version
        run: |
          set -euo pipefail
          version=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          test -n "$version" || { echo "::error::could not parse version from pyproject.toml"; exit 1; }
          echo "value=${version}" >> "$GITHUB_OUTPUT"
          echo "resolved version: ${version}"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.binsim
          push: true
          cache-from: type=gha,scope=binsim
          cache-to: type=gha,mode=max,scope=binsim
          tags: |
            ${{ steps.meta.outputs.image }}:sha-${{ github.sha }}
            ${{ github.ref == 'refs/heads/main' && format('{0}:{1}', steps.meta.outputs.image, steps.version.outputs.value) || '' }}
            ${{ github.ref == 'refs/heads/main' && format('{0}:main', steps.meta.outputs.image) || '' }}
