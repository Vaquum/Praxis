apiVersion: 1

datasources:
  - name: Praxis ClickHouse
    type: grafana-clickhouse-datasource
    uid: praxis-clickhouse
    isDefault: true
    editable: true
    jsonData:
      defaultDatabase: praxis
      port: 8123
      host: praxis-clickhouse
      username: praxis
      protocol: http
      secure: false
      tlsSkipVerify: true
    secureJsonData:
      password: ${CLICKHOUSE_PASSWORD}
